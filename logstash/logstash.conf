input {
  beats { port => 5044 }
}

filter {
  # The app (pino) and worker log JSON to stdout; filebeat already tries to
  # decode it into the `json` field. Promote useful fields + tag the source.
  if [container][name] {
    mutate { add_field => { "service_name" => "%{[container][name]}" } }
  }

  if [json][level] {
    mutate { add_field => { "log_level" => "%{[json][level]}" } }
  }
  if [json][msg] {
    mutate { add_field => { "log_message" => "%{[json][msg]}" } }
  }

  # nginx access logs are JSON too (see nginx log_format json).
  if [json][status] {
    mutate { add_field => { "http_status" => "%{[json][status]}" } }
  }

  date {
    match => ["[json][time]", "ISO8601"]
    target => "@timestamp"
    tag_on_failure => []
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "pisster-%{+YYYY.MM.dd}"
  }
}
