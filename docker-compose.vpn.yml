# Route scrape *source* traffic through NordVPN via Gluetun's HTTP proxy.
#
# Proxy mode (not network_mode) so the worker can still reach postgres/redis on
# the Docker network, and so ParadiseHill CDN downloads can bypass the VPN —
# NordVPN exits get HTTP 503 from vN.paradisehill.cc while the EC2 IP works.
#
# Setup:
#   1. In Nord Account → NordVPN → Manual setup → Service credentials,
#      generate an OpenVPN username/password (NOT your login password).
#   2. Add to .env:
#        NORDVPN_OPENVPN_USER=...
#        NORDVPN_OPENVPN_PASSWORD=...
#        NORDVPN_SERVER_COUNTRIES=Netherlands,Germany,France   # avoid US (age-verification)
#        SCRAPE_HTTP_PROXY=http://gluetun:8888
#        COMPOSE_FILE=docker-compose.yml:docker-compose.vpn.yml
#   3. Recreate:
#        docker compose up -d gluetun worker
#
# To revert to direct (datacenter) IP:
#        unset SCRAPE_HTTP_PROXY (or empty it) and `docker compose up -d worker`
#        without this overlay — or keep gluetun running unused.
#
# Gluetun control API is on http://127.0.0.1:8000 (optional debugging).

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: nordvpn
      VPN_TYPE: openvpn
      OPENVPN_USER: ${NORDVPN_OPENVPN_USER:?Set NORDVPN_OPENVPN_USER in .env — Nord service credentials, not login password}
      OPENVPN_PASSWORD: ${NORDVPN_OPENVPN_PASSWORD:?Set NORDVPN_OPENVPN_PASSWORD in .env}
      # Non-US countries avoid xHamster's US state age-verification wall.
      SERVER_COUNTRIES: ${NORDVPN_SERVER_COUNTRIES:-Netherlands,Germany,France}
      # HTTP proxy for the worker (SCRAPE_HTTP_PROXY=http://gluetun:8888).
      HTTPPROXY: "on"
      # Allow postgres/redis/S3 on Docker-internal subnets without forcing VPN.
      FIREWALL_OUTBOUND_SUBNETS: ${DOCKER_INTERNAL_SUBNETS:-172.16.0.0/12,10.0.0.0/8,192.168.0.0/16}
      TZ: UTC
    volumes:
      - gluetun:/gluetun
    ports:
      - "127.0.0.1:8000:8000/tcp"
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  worker:
    # Stay on the compose network (do NOT use network_mode: service:gluetun) so
    # ParadiseHill CDN can be fetched direct while xHamster/etc use the proxy.
    environment:
      SCRAPE_HTTP_PROXY: ${SCRAPE_HTTP_PROXY:-http://gluetun:8888}
      # Keep DB/Redis/S3/local off the proxy even if a shell exports HTTP_PROXY.
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis,gluetun,s3.amazonaws.com,.amazonaws.com,paradisehill.cc,.paradisehill.cc}
      no_proxy: ${NO_PROXY:-localhost,127.0.0.1,postgres,redis,gluetun,s3.amazonaws.com,.amazonaws.com,paradisehill.cc,.paradisehill.cc}
    depends_on:
      gluetun:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  gluetun:
