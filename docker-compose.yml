services:
  # ── App (Next.js standalone) ──────────────────────────────────────
  web:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    expose: ["3000"]
    volumes:
      # Creator uploads are streamed here; the worker reads them from the same
      # volume to transcode + generate media.
      - uploads:/app/uploads
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  # ── DB migrations (one-shot; runs the full toolchain image) ────────
  migrate:
    build: { context: ., dockerfile: Dockerfile, target: builder }
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    command: npx prisma migrate deploy
    restart: "no"

  # ── Python scrape worker ──────────────────────────────────────────
  worker:
    build: { context: ., dockerfile: worker/Dockerfile }
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    volumes:
      - downloads:/app/downloads
      - uploads:/app/uploads
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  # ── Python video analyzer (native video AI models) ────────────────
  video-analyzer:
    build: { context: ., dockerfile: video-analyzer/Dockerfile }
    restart: unless-stopped
    env_file: .env
    environment:
      DOWNLOADS_DIR: /app/downloads
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    volumes:
      - downloads:/app/downloads
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  # ── Python promo ad generator (clip compose + generative AI) ─────
  ad-generator:
    build: { context: ., dockerfile: ad-generator/Dockerfile }
    restart: unless-stopped
    env_file: .env
    environment:
      DOWNLOADS_DIR: /app/downloads
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    volumes:
      - downloads:/app/downloads
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  # ── Internal edge: app router + protecting CDN edge ────────────────
  # TLS + public routing are handled by the EXISTING dockerized Caddy
  # (chiro-caddy) which already owns host :80/:443 and does automatic HTTPS.
  # Caddy reverse-proxies the Pisster domains to this container over the shared
  # `chiro_default` network (alias `pisster-edge`). The 127.0.0.1:${EDGE_HTTP_PORT}
  # publish is kept only for local debugging on the host.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [web]
    ports: ["127.0.0.1:${EDGE_HTTP_PORT:-8080}:80"]
    environment:
      PRIMARY_DOMAIN: ${PRIMARY_DOMAIN}
      ADMIN_SUBDOMAIN: ${ADMIN_SUBDOMAIN:-admin}
      ADMIN_BASE_DOMAIN: ${ADMIN_BASE_DOMAIN:-sharlila.com}
      SITE_SERVER_NAMES: ${SITE_SERVER_NAMES:-pisster.com www.pisster.com fbbtube.com www.fbbtube.com sharlila.com www.sharlila.com admin.sharlila.com}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
    networks:
      default: {}
      chiro_default:
        aliases: [pisster-edge]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  # ── Datastores ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pisster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pisster}
      POSTGRES_DB: ${POSTGRES_DB:-pisster}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pisster}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
  downloads:
  uploads:

networks:
  # The default network compose creates for this project (web/postgres/redis/…).
  default: {}
  # The existing Caddy's network (owned by the chiro compose project). The edge
  # nginx joins it so Caddy can reverse-proxy to `pisster-edge`. Must already
  # exist — it does whenever the chiro stack is up.
  chiro_default:
    external: true
