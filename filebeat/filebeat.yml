filebeat.inputs:
  - type: container
    paths:
      - /var/lib/docker/containers/*/*.log

# Enrich with docker metadata (container name, image, compose service).
processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  - decode_json_fields:
      fields: ["message"]
      target: "json"
      overwrite_keys: true
      add_error_key: true

# Ship to Logstash for parsing/routing.
output.logstash:
  hosts: ["logstash:5044"]

logging.level: warning
