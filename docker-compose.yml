services:
  # ── App (Next.js standalone) ──────────────────────────────────────
  web:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    expose: ["3000"]
    volumes:
      # Creator uploads are streamed here; the worker reads them from the same
      # volume to transcode + generate media.
      - uploads:/app/uploads
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  # ── DB migrations (one-shot; runs the full toolchain image) ────────
  migrate:
    build: { context: ., dockerfile: Dockerfile, target: builder }
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
    command: npx prisma migrate deploy
    restart: "no"

  # ── Python scrape worker ──────────────────────────────────────────
  worker:
    build: { context: ., dockerfile: worker/Dockerfile }
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    volumes:
      - downloads:/app/downloads
      - uploads:/app/uploads
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  # ── Internal edge: app router + protecting CDN edge ────────────────
  # TLS + public routing are handled by the EXISTING dockerized Caddy
  # (chiro-caddy) which already owns host :80/:443 and does automatic HTTPS.
  # Caddy reverse-proxies the Pisster domains to this container over the shared
  # `chiro_default` network (alias `pisster-edge`). The 127.0.0.1:${EDGE_HTTP_PORT}
  # publish is kept only for local debugging on the host.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [web]
    ports: ["127.0.0.1:${EDGE_HTTP_PORT:-8080}:80"]
    environment:
      PRIMARY_DOMAIN: ${PRIMARY_DOMAIN}
      ADMIN_SUBDOMAIN: ${ADMIN_SUBDOMAIN}
      CDN_SIGNING_SECRET: ${CDN_SIGNING_SECRET}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - nginx-cache:/var/cache/nginx
    networks:
      default: {}
      chiro_default:
        aliases: [pisster-edge]
    logging: { driver: json-file, options: { max-size: "10m", max-file: "3" } }

  # ── Datastores ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pisster}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pisster}
      POSTGRES_DB: ${POSTGRES_DB:-pisster}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pisster}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data

  # ── ELK logging stack ─────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    expose: ["9200"]

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    restart: unless-stopped
    depends_on: [elasticsearch]
    volumes:
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    expose: ["5044"]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    restart: unless-stopped
    depends_on: [elasticsearch]
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    # Localhost only — reach it via SSH tunnel; it has no auth.
    ports: ["127.0.0.1:5601:5601"]

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.3
    restart: unless-stopped
    user: root
    depends_on: [logstash]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["--strict.perms=false"]

volumes:
  pgdata:
  redisdata:
  esdata:
  downloads:
  uploads:
  nginx-cache:

networks:
  # The default network compose creates for this project (web/postgres/redis/…).
  default: {}
  # The existing Caddy's network (owned by the chiro compose project). The edge
  # nginx joins it so Caddy can reverse-proxy to `pisster-edge`. Must already
  # exist — it does whenever the chiro stack is up.
  chiro_default:
    external: true
