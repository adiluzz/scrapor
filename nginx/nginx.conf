user  nginx;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events { worker_connections 2048; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format json escape=json '{'
        '"time":"$time_iso8601","remote_addr":"$remote_addr",'
        '"method":"$request_method","uri":"$uri","status":$status,'
        '"bytes":$body_bytes_sent,"referer":"$http_referer",'
        '"ua":"$http_user_agent","host":"$host","rt":$request_time}';

    access_log /var/log/nginx/access.log json;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 0; # uploads go direct-to-S3, not through nginx

    # This nginx runs behind the HOST nginx. Trust its X-Forwarded-For so that
    # $remote_addr is the real client IP — required for the IP-bound secure_link
    # CDN signatures to validate. Only private/docker ranges are trusted.
    set_real_ip_from 127.0.0.1;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # Preserve the scheme the host nginx terminated (https), falling back to
    # the connection scheme if the host didn't set it.
    map $http_x_forwarded_proto $fwd_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # Edge cache for CDN assets (thumbnails/previews/storyboards).
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=cdncache:50m
                     max_size=5g inactive=24h use_temp_path=off;

    resolver 127.0.0.11 8.8.8.8 ipv6=off valid=30s;

    include /etc/nginx/conf.d/*.conf;
}
