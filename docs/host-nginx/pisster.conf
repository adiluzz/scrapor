# ============================================================================
# HOST nginx vhost for Pisster (runs on the server's existing nginx).
#
# It terminates TLS and reverse-proxies all Pisster domains to the dockerized
# "internal" nginx published on 127.0.0.1:8080 (EDGE_HTTP_PORT). That internal
# nginx does the app routing + protecting-CDN edge (secure_link + S3 presign).
#
# IMPORTANT: the :443 block below references Let's Encrypt cert files, so you must
# issue the certificate BEFORE enabling this file, otherwise `nginx -t` fails.
# Follow docs/DEPLOYMENT.md §6 (bootstrap HTTP vhost → certbot certonly --webroot
# → swap in this file). Summary:
#   sudo certbot certonly --webroot -w /var/www/html \
#        -d pisster.com -d www.pisster.com -d admin.pisster.com -d cdn.pisster.com
#   sudo cp docs/host-nginx/pisster.conf /etc/nginx/sites-available/pisster.conf
#   sudo ln -s /etc/nginx/sites-available/pisster.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

upstream pisster_edge {
    server 127.0.0.1:8080;   # = EDGE_HTTP_PORT from the compose stack
    keepalive 32;
}

# Shared proxy settings — forward real client IP + scheme so the app can sign
# IP-bound CDN URLs and build absolute (https) URLs correctly.
#   (place this file's proxy_set_header lines inside each location)

server {
    listen 80;
    listen [::]:80;
    server_name pisster.com www.pisster.com admin.pisster.com cdn.pisster.com;

    # Let the host certbot answer HTTP-01 challenges.
    location /.well-known/acme-challenge/ { root /var/www/html; }

    # Everything else → HTTPS (certbot usually adds this redirect for you).
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pisster.com www.pisster.com admin.pisster.com cdn.pisster.com;

    # --- TLS (managed by host certbot; paths shown for reference) ---
    ssl_certificate     /etc/letsencrypt/live/pisster.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pisster.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Uploads go direct-to-S3 (presigned PUT), so nginx never buffers big bodies.
    client_max_body_size 20m;

    location / {
        proxy_pass http://pisster_edge;
        proxy_http_version 1.1;

        # Preserve the original hostname so the internal nginx routes by Host
        # (public site vs admin.* vs cdn.*) and the app resolves the right Site.
        proxy_set_header Host              $host;

        # Real client IP + scheme — REQUIRED for IP-bound CDN signatures + HTTPS URLs.
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Streaming-friendly (video range requests, no response buffering).
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
    }
}
